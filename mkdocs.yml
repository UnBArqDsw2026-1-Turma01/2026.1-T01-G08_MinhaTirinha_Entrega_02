site_name: MinhaTirinha - Grupo 08
site_url: https://github.com/UnBArqDsw2026-1-Turma01/2026.1-T01-G08_MinhaTirinha_Entrega_02

repo_url: https://github.com/UnBArqDsw2026-1-Turma01/2026.1-T01-G08_MinhaTirinha_Entrega_02
repo_name: GitHub

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/UnBArqDsw2026-1-Turma01/2026.1-T01-G08_MinhaTirinha_Entrega_02

theme:
  name: material
  font:
    text: Nunito
    code: Fira Code
  palette:

    # Modo claro — tons pastéis
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: pink
      accent: purple
      toggle:
        icon: material/weather-night
        name: Mudar para modo escuro

    # Modo escuro — pastel noturno
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: pink
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Mudar para modo claro

  features:
    - navigation.tabs
    - content.code.copy
    - navigation.instant
    - navigation.instant.progress
    - navigation.top
    - navigation.sections

extra_css:
  - stylesheets/pastel.css

nav:
  - Apresentação: index.md
  # - Entrega 1: 
  #   - Artefatos Generalistas: 
  #       - Entrega1/Artefatos Generalistas
  # - Planejamento: 
  #   - Cronograma: Planejamento/Cronograma/Cronograma.md
  #   - Ferramentas: Planejamento/Ferramentas/Ferramentas.md
  #   - Metodologia: Planejamento/Metodologia/Metodologia.md

  - Atas Reunião: 
    - Entrega 01:
      - Ata I: Base/Atas/Entrega 01/Ata I.md
      - Ata II: Base/Atas/Entrega 01/Ata II.md
      - Ata III: Base/Atas/Entrega 01/Ata III.md
  - 1. Desenho de Software: 
    - 1.1. Design Sprint: Base/1.1.DesignSprint.md
    - 1.2. Artefato Generalista:
          - Base: Base/1.2.ArtefatoGeneralista.md
    - 1.3. Modelagem BPMN: Base/1.3.ModelagemBPMN.md
    - 1.4. Participações - Base: Base/1.4.ParticipacoesBase.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
